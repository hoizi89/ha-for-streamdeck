<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body{font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#ddd;background:#2d2d2d;margin:0;padding:10px}
  .row{display:flex;align-items:center;margin:6px 0}
  .row label{flex:0 0 92px;text-align:right;padding-right:8px;color:#9fb3c8}
  .row input,.row select{flex:1;background:#3d3d3d;border:1px solid #555;color:#fff;padding:5px;border-radius:4px}
  .hint{color:#888;margin:2px 0 8px 100px;font-size:11px}
  h3{color:#fff;margin:4px 0 8px}
</style>
</head>
<body>
<h3 data-i18n="h"></h3>
<div class="row" style="justify-content:flex-end;margin:0"><a href="#" id="connToggle" data-i18n="conn" style="color:#6aa0e0;text-decoration:none;font-size:11px"></a></div>
<div id="connBox">
  <div class="row"><label data-i18n="url"></label><input id="url" placeholder="http://homeassistant.local:8123"></div>
  <div class="row"><label data-i18n="token"></label><input id="token" type="password"></div>
  <div class="hint" data-i18n="tokenHint"></div>
  <div class="row"><label data-i18n="bg"></label>
    <select id="bgtheme">
      <option value="" data-i18n="bg_default"></option>
      <option value="black" data-i18n="bg_black"></option>
      <option value="gray" data-i18n="bg_gray"></option>
      <option value="blue" data-i18n="bg_blue"></option>
      <option value="green" data-i18n="bg_green"></option>
      <option value="purple" data-i18n="bg_purple"></option>
      <option value="teal" data-i18n="bg_teal"></option>
    </select>
  </div>
  <div class="hint" data-i18n="bgHint"></div>
  <div class="row"><label data-i18n="acc"></label>
    <select id="accent">
      <option value="" data-i18n="ac_green"></option>
      <option value="blue" data-i18n="ac_blue"></option>
      <option value="purple" data-i18n="ac_purple"></option>
      <option value="orange" data-i18n="ac_orange"></option>
      <option value="red" data-i18n="ac_red"></option>
      <option value="teal" data-i18n="ac_teal"></option>
      <option value="pink" data-i18n="ac_pink"></option>
    </select>
  </div>
  <div class="hint" data-i18n="accHint"></div>
</div>
<div class="row" id="entitySummary" style="display:none"><label data-i18n="player"></label><span id="entityName" style="flex:1;padding:5px 0;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</span><a href="#" id="entityEdit" data-i18n="change" style="color:#6aa0e0;text-decoration:none;font-size:11px;margin-left:8px"></a></div>
<div id="entityBox">
<div class="row"><label data-i18n="search"></label><input id="search" placeholder="tippen zum Filtern…"></div>
<div class="row"><label data-i18n="player"></label><select id="entity" size="5"></select></div>
</div>
<div class="row"><label data-i18n="func"></label>
  <select id="role">
    <option value="playpause" data-i18n="r_pp"></option>
    <option value="nowplaying" data-i18n="r_now"></option>
    <option value="next" data-i18n="r_next"></option>
    <option value="prev" data-i18n="r_prev"></option>
    <option value="volup" data-i18n="r_up"></option>
    <option value="voldown" data-i18n="r_down"></option>
    <option value="stop" data-i18n="r_stop"></option>
    <option value="play" data-i18n="r_play"></option>
  </select>
</div>
<div class="row"><label data-i18n="pl"></label><select id="playlistPick"><option value="">— laden… —</option></select></div>
<div class="row"><label data-i18n="playmode"></label>
  <select id="playmode">
    <option value="" data-i18n="pm_single"></option>
    <option value="next" data-i18n="pm_next"></option>
    <option value="hold" data-i18n="pm_hold"></option>
  </select>
</div>
<div class="row"><label data-i18n="pl2"></label><select id="playlistPick2"></select></div>
<div class="row"><label data-i18n="pl3"></label><select id="playlistPick3"></select></div>
<div class="row"><label data-i18n="pl4"></label><select id="playlistPick4"></select></div>
<div class="row"><label data-i18n="content"></label><input id="ma_media" placeholder="oder Name/URI manuell"></div>
<div class="row"><label data-i18n="matype"></label>
  <select id="ma_type">
    <option value="playlist">playlist</option><option value="album">album</option>
    <option value="artist">artist</option><option value="track">track</option><option value="radio">radio</option>
  </select>
</div>
<div class="row"><label data-i18n="iconlbl"></label>
  <select id="hideicon">
    <option value="" data-i18n="ic_show"></option>
    <option value="1" data-i18n="ic_hide"></option>
  </select>
</div>
<div class="row"><label data-i18n="proglbl"></label>
  <select id="hideprogress">
    <option value="" data-i18n="pr_show"></option>
    <option value="1" data-i18n="pr_hide"></option>
  </select>
</div>
<div class="row"><label data-i18n="coverlbl"></label>
  <select id="cover">
    <option value="" data-i18n="cv_theme"></option>
    <option value="color" data-i18n="cv_color"></option>
    <option value="1" data-i18n="cv_cover"></option>
    <option value="2" data-i18n="cv_cover_play"></option>
  </select>
</div>
<div class="row"><label data-i18n="colorlbl"></label>
  <select id="keybg">
    <option value="black" data-i18n="bg_black"></option>
    <option value="gray" data-i18n="bg_gray"></option>
    <option value="blue" data-i18n="bg_blue"></option>
    <option value="green" data-i18n="bg_green"></option>
    <option value="purple" data-i18n="bg_purple"></option>
    <option value="teal" data-i18n="bg_teal"></option>
  </select>
</div>
<div class="row"><label data-i18n="name"></label><input id="title"></div>
<div class="row"><label data-i18n="namesize"></label>
  <select id="namesize">
    <option value="" data-i18n="ns_auto"></option>
    <option value="S" data-i18n="ns_s"></option>
    <option value="L" data-i18n="ns_l"></option>
    <option value="off" data-i18n="ns_off"></option>
  </select>
</div>
<div class="row"><label data-i18n="longpress"></label>
  <select id="longpress">
    <option value="" data-i18n="lgp_none"></option>
    <option value="url" data-i18n="lgp_url"></option>
    <option value="service" data-i18n="lgp_svc"></option>
  </select>
</div>
<div class="row"><label data-i18n="longurl"></label><input id="longurl" placeholder="https://…"></div>
<div class="row"><label data-i18n="longsvc"></label><input id="longservice" list="svclist" placeholder="media_player.turn_on"></div>
<datalist id="svclist"></datalist>

<script>
const I18N = {
  de:{h:'Media / Music Assistant',url:'Server-URL',token:'Token',tokenHint:'Nur einmal nötig – wird global gespeichert und bei neuen Kacheln vorausgefüllt.',search:'Suche',player:'Player',func:'Funktion',content:'MA-Inhalt',matype:'MA-Typ',name:'Titel',searchPh:'tippen zum Filtern…',
     r_pp:'Play / Pause',r_now:'Aktuelle Wiedergabe',r_next:'Nächster Titel',r_prev:'Vorheriger Titel',r_up:'Lauter',r_down:'Leiser',r_stop:'Stopp',r_play:'Music Assistant abspielen',conn:'⚙ Globale Einstellungen',pl:'Bibliothek',pl2:'Playlist 2',pl3:'Playlist 3',pl4:'Playlist 4',playmode:'Modus',pm_single:'Einzeln',pm_next:'Karussell: Tippen = nächste',pm_hold:'Karussell: Tippen umschalten · Halten blättert',change:'✎ Ändern',iconlbl:'Icon',ic_show:'Anzeigen',ic_hide:'Ausblenden (nur Text)',proglbl:'Fortschritt',pr_show:'Balken anzeigen',pr_hide:'Ausblenden',coverlbl:'Hintergrund',cv_theme:'Theme-Farbe (global)',cv_color:'Andere Farbe',colorlbl:'Farbe',cv_cover:'Album-Cover',cv_cover_play:'Album-Cover (nur beim Abspielen)',namesize:'Namensgröße',ns_auto:'Automatisch',ns_s:'Klein',ns_l:'Groß',ns_off:'Aus (kein Name)',bg:'Hintergrund',bg_default:'Standard (Blaugrau)',bg_black:'Schwarz',bg_gray:'Grau',bg_blue:'Blau',bg_green:'Grün',bg_purple:'Lila',bg_teal:'Türkis',bgHint:'Standard-Hintergrund für alle Kacheln.',acc:'Aktiv-Farbe',accHint:'Farbe wenn Media läuft (gilt für alle Kacheln).',ac_green:'Grün',ac_blue:'Blau',ac_purple:'Lila',ac_orange:'Orange',ac_red:'Rot',ac_teal:'Türkis',ac_pink:'Pink',longpress:'Langer Druck',lgp_none:'—',lgp_url:'Website öffnen',lgp_gmail:'Gmail öffnen',lgp_svc:'HA-Dienst aufrufen',longurl:'Website-URL',longsvc:'Dienst'},
  en:{h:'Media / Music Assistant',url:'Server URL',token:'Token',tokenHint:'Needed once – stored globally and pre-filled on new keys.',search:'Search',player:'Player',func:'Function',content:'MA content',matype:'MA type',name:'Title',searchPh:'type to filter…',
     r_pp:'Play / Pause',r_now:'Now playing',r_next:'Next track',r_prev:'Previous track',r_up:'Volume up',r_down:'Volume down',r_stop:'Stop',r_play:'Play Music Assistant',conn:'⚙ Global settings',pl:'Library',pl2:'Playlist 2',pl3:'Playlist 3',pl4:'Playlist 4',playmode:'Mode',pm_single:'Single',pm_next:'Carousel: tap = next',pm_hold:'Carousel: tap toggle · hold browse',change:'✎ Change',iconlbl:'Icon',ic_show:'Show',ic_hide:'Hide (text only)',proglbl:'Progress',pr_show:'Show bar',pr_hide:'Hide',coverlbl:'Background',cv_theme:'Theme colour (global)',cv_color:'Custom colour',colorlbl:'Colour',cv_cover:'Album cover',cv_cover_play:'Album cover (only while playing)',namesize:'Name size',ns_auto:'Automatic',ns_s:'Small',ns_l:'Large',ns_off:'Off (no name)',bg:'Background',bg_default:'Default (blue-grey)',bg_black:'Black',bg_gray:'Grey',bg_blue:'Blue',bg_green:'Green',bg_purple:'Purple',bg_teal:'Teal',bgHint:'Default background for all keys.',acc:'Active colour',accHint:'Colour while media plays (applies to all keys).',ac_green:'Green',ac_blue:'Blue',ac_purple:'Purple',ac_orange:'Orange',ac_red:'Red',ac_teal:'Teal',ac_pink:'Pink',longpress:'Long press',lgp_none:'—',lgp_url:'Open website',lgp_gmail:'Open Gmail',lgp_svc:'Call HA service',longurl:'Website URL',longsvc:'Service'}
};
let L = I18N.de;
const $ = id => document.getElementById(id);
function applyLang(){ document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n'); if(L[k]!=null) el.textContent=L[k];}); const s=$('search'); if(s) s.placeholder=L.searchPh; }
function updateConnVisibility(){ const has=$('url').value && $('token').value; const b=$('connBox'); if(b) b.style.display = has ? 'none' : ''; }
function setPlayerName(){ const id=settings.entity; let name=id||'—'; const e=allPlayers.find(x=>x.id===id); if(e) name=e.name; const el=$('entityName'); if(el) el.textContent=name; }
function updatePlayerVisibility(){ const has=!!settings.entity; const box=$('entityBox'), sum=$('entitySummary'); if(box) box.style.display=has?'none':''; if(sum) sum.style.display=has?'':'none'; setPlayerName(); }
function showRow(id,on){ const el=document.getElementById(id); if(!el) return; const row=el.closest('.row'); if(row) row.style.display=on?'':'none'; }
function updateMediaVis(){
  const play = $('role').value==='play';
  showRow('ma_type', play);
  showRow('ma_media', play);
  showRow('playlistPick', play);
  showRow('playmode', play);
  const carousel = play && ($('playmode').value==='next' || $('playmode').value==='hold');
  showRow('playlistPick2', carousel);
  showRow('playlistPick3', carousel);
  showRow('playlistPick4', carousel);
  showRow('hideicon', play);
  showRow('hideprogress', ['playpause','play','nowplaying'].indexOf($('role').value)>=0);
  showRow('cover', ['playpause','play','nowplaying'].indexOf($('role').value)>=0);
  showRow('keybg', $('cover').value==='color');
  const lpv = $('longpress').value || '';                    // long-press → open URL / Gmail / service
  showRow('longurl', lpv==='url');
  showRow('longservice', lpv==='service');
}
function populatePlaylists(items){
  // fill all four picker slots from the same library, each pre-selecting its saved value
  const slots = [['playlistPick','ma_media','ma_name'],['playlistPick2','ma_media2','ma_name2'],['playlistPick3','ma_media3','ma_name3'],['playlistPick4','ma_media4','ma_name4']];
  slots.forEach(([pid, mkey, nkey])=>{
    const sel=$(pid); if(!sel) return;
    sel.innerHTML=''; const none=document.createElement('option'); none.value=''; none.textContent='—'; sel.appendChild(none);
    (items||[]).forEach(it=>{ const name=it.name||it.title||it.uri||''; const val=it.uri||it.name||''; if(!val) return; const o=document.createElement('option'); o.value=val; o.textContent=name; sel.appendChild(o); });
    const cur = settings[mkey] || (pid==='playlistPick' ? $('ma_media').value : '');
    if(cur){
      if(![].some.call(sel.options,o=>o.value===cur)){ const o=document.createElement('option'); o.value=cur; o.textContent=settings[nkey]||cur; sel.appendChild(o); }
      sel.value=cur;
    }
  });
}
let plWs=null;
function loadPlaylists(){
  const url=$('url').value, token=$('token').value;
  if(!url||!token || $('role').value!=='play') return;
  let wsUrl=url.replace(/\/+$/,'')+'/api/websocket'; wsUrl=wsUrl.replace(/^http:/,'ws:').replace(/^https:/,'wss:');
  try{ if(plWs) plWs.close(); plWs=new WebSocket(wsUrl);}catch(e){ return; }
  let id=1, entriesId=0, libId=0;
  plWs.onmessage=(ev)=>{
    let m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
    if(m.type==='auth_required') plWs.send(JSON.stringify({type:'auth',access_token:token}));
    else if(m.type==='auth_ok'){ entriesId=id; plWs.send(JSON.stringify({id:id++,type:'config_entries/get'})); }
    else if(m.type==='result' && m.id===entriesId){
      const list=Array.isArray(m.result)?m.result:((m.result&&m.result.entries)||[]);
      const ma=list.find(e=>e.domain==='music_assistant');
      if(!ma){ plWs.close(); return; }
      libId=id;
      const mt = ($('ma_type').value || 'playlist');
      plWs.send(JSON.stringify({id:id++,type:'call_service',domain:'music_assistant',service:'get_library',service_data:{config_entry_id:ma.entry_id,media_type:mt,limit:200},return_response:true}));
    } else if(m.type==='result' && m.id===libId){
      let items=[]; const r=m.result&&m.result.response;
      if(r){ items=r.items||r.playlists||(Array.isArray(r)?r:[]); }
      populatePlaylists(items); plWs.close();
    }
  };
  plWs.onerror=()=>{};
}

let ws=null, uuid=null, settings={};
const fields = ['url','token','entity','role','ma_media','ma_type','playmode','hideicon','hideprogress','cover','keybg','title','namesize','longpress','longurl','longservice'];
let globalSettings = {};
function writeGlobal(){
  globalSettings.url = $('url').value; globalSettings.token = $('token').value;
  const bt=$('bgtheme'); if(bt) globalSettings.bg = bt.value;
  const ac=$('accent'); if(ac) globalSettings.accent = ac.value;
  if (ws && ws.readyState===1) ws.send(JSON.stringify({ event:'setGlobalSettings', context:uuid, payload:globalSettings }));
}
function save(){
  fields.forEach(f => { if (f!=='entity') settings[f] = $(f).value; });
  const ev = $('entity').value;
  if (ev) settings.entity = ev;          // keep chosen player – never wipe it with an empty value
  if (ws && ws.readyState===1){
    ws.send(JSON.stringify({ event:'setSettings', context:uuid, payload:settings }));
    if ($('url').value && $('token').value) writeGlobal();   // preserves global bg theme
  }
}
document.addEventListener('input', e => {
  if (rendering) return;
  if (fields.indexOf(e.target.id)>=0) save();
  if (e.target.id==='url'||e.target.id==='token'){ scheduleLoad(); loadServices(); }
  if (e.target.id==='search') renderOptions();
});
document.addEventListener('change', e => {
  if (rendering) return;
  if (fields.indexOf(e.target.id)>=0) save();
  if (e.target.id==='cover'){                        // "Andere Farbe" reveals the colour picker
    if ($('cover').value==='color'){ if(!$('keybg').value){ $('keybg').value='black'; settings.keybg='black'; } }
    else { $('keybg').value=''; settings.keybg=''; }
    save(); updateMediaVis();
  }
  if (e.target.id==='role' || e.target.id==='ma_type' || e.target.id==='playmode' || e.target.id==='longpress') updateMediaVis();
  if (e.target.id==='role' || e.target.id==='ma_type' || e.target.id==='playmode') loadPlaylists();
  if (e.target.id==='entity') updatePlayerVisibility();          // collapse list after picking
  if (e.target.id==='bgtheme'){ globalSettings.bg=$('bgtheme').value; writeGlobal(); }
  if (e.target.id==='accent'){ globalSettings.accent=$('accent').value; writeGlobal(); }
  if (e.target.id==='playlistPick'){ const sel=$('playlistPick'); const v=sel.value; if(v){ $('ma_media').value=v; settings.ma_name=sel.options[sel.selectedIndex].textContent; save(); } }
  if (e.target.id==='playlistPick2' || e.target.id==='playlistPick3' || e.target.id==='playlistPick4'){
    const sel=$(e.target.id), n=e.target.id.slice(-1), v=sel.value;
    settings['ma_media'+n]=v; settings['ma_name'+n]= v ? sel.options[sel.selectedIndex].textContent : ''; save();
  }
});

let loadTimer=null, haWs=null, allPlayers=[], rendering=false;
function scheduleLoad(){ clearTimeout(loadTimer); loadTimer=setTimeout(loadPlayers, 500); }
function renderOptions(){
  rendering = true;
  const q=($('search').value||'').toLowerCase();
  const cur=settings.entity || $('entity').value;
  const list=allPlayers.filter(e=>!q||e.name.toLowerCase().indexOf(q)>=0);
  const sel=$('entity'); sel.innerHTML='';
  list.forEach(it=>{ const o=document.createElement('option'); o.value=it.id; o.textContent=it.name; sel.appendChild(o); });
  if(cur){ if(!list.some(i=>i.id===cur)){ const o=document.createElement('option'); o.value=cur; o.textContent=cur; sel.appendChild(o);} sel.value=cur; }
  rendering = false;
  setPlayerName();
}
function loadPlayers(){
  const url=$('url').value, token=$('token').value; if(!url||!token) return;
  let wsUrl=url.replace(/\/+$/,'')+'/api/websocket'; wsUrl=wsUrl.replace(/^http:/,'ws:').replace(/^https:/,'wss:');
  try{ if(haWs) haWs.close(); haWs=new WebSocket(wsUrl); }catch(e){ return; }
  let id=1, getId=0;
  haWs.onmessage=(ev)=>{
    let m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
    if(m.type==='auth_required') haWs.send(JSON.stringify({type:'auth',access_token:token}));
    else if(m.type==='auth_ok'){ getId=id; haWs.send(JSON.stringify({id:id++,type:'get_states'})); }
    else if(m.type==='result' && m.id===getId && Array.isArray(m.result)){
      allPlayers=m.result.filter(s=>s.entity_id.indexOf('media_player.')===0)
        .map(s=>({id:s.entity_id,name:(s.attributes&&s.attributes.friendly_name)||s.entity_id}))
        .sort((a,b)=>a.name.localeCompare(b.name));
      renderOptions(); haWs.close();
    }
  };
  haWs.onerror=()=>{};
}

let svcWs=null;
function loadServices(){
  const url=$('url').value, token=$('token').value; if(!url||!token) return;
  let wsUrl=url.replace(/\/+$/,'')+'/api/websocket'; wsUrl=wsUrl.replace(/^http:/,'ws:').replace(/^https:/,'wss:');
  try{ if(svcWs) svcWs.close(); svcWs=new WebSocket(wsUrl); }catch(e){ return; }
  let id=1, getId=0;
  svcWs.onmessage=(ev)=>{
    let m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
    if(m.type==='auth_required') svcWs.send(JSON.stringify({type:'auth',access_token:token}));
    else if(m.type==='auth_ok'){ getId=id; svcWs.send(JSON.stringify({id:id++,type:'get_services'})); }
    else if(m.type==='result' && m.id===getId && m.result){
      const dl=$('svclist'); if(dl){ dl.innerHTML='';
        Object.keys(m.result).sort().forEach(dom=>{ Object.keys(m.result[dom]).sort().forEach(svc=>{ const o=document.createElement('option'); o.value=dom+'.'+svc; dl.appendChild(o); }); });
      }
      svcWs.close();
    }
  };
  svcWs.onerror=()=>{};
}

function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo){
  uuid = inUUID;
  try { const info=JSON.parse(inInfo); const lang=(info.application&&info.application.language||'en').slice(0,2); L = I18N[lang]||I18N.en; } catch(e){}
  applyLang();
  try { settings = JSON.parse(inActionInfo).payload.settings || {}; } catch(e){ settings = {}; }
  fields.forEach(f => { if (settings[f]!=null && $(f)) $(f).value = settings[f]; });
  $('connToggle').addEventListener('click', e=>{ e.preventDefault(); const b=$('connBox'); b.style.display = (b.style.display==='none') ? '' : 'none'; });
  $('entityEdit').addEventListener('click', e=>{ e.preventDefault(); $('entityBox').style.display=''; $('entitySummary').style.display='none'; });
  updateConnVisibility();
  updatePlayerVisibility();
  updateMediaVis();
  loadPlaylists();
  ws = new WebSocket('ws://127.0.0.1:' + inPort);
  ws.onopen = ()=>{
    ws.send(JSON.stringify({ event:inRegisterEvent, uuid:inUUID }));
    ws.send(JSON.stringify({ event:'getGlobalSettings', context:inUUID }));
    scheduleLoad(); loadServices();
  };
  ws.onmessage = (ev)=>{
    let m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
    if (m.event==='didReceiveSettings' && m.payload && m.payload.settings){
      settings = m.payload.settings;
      fields.forEach(f => { if (settings[f]!=null && $(f)) $(f).value = settings[f]; });
      renderOptions(); updatePlayerVisibility(); updateMediaVis();
    } else if (m.event==='didReceiveGlobalSettings' && m.payload && m.payload.settings){
      const g = m.payload.settings;
      globalSettings = Object.assign({}, g);
      const bt=$('bgtheme'); if(bt) bt.value = g.bg||'';
      const ac=$('accent'); if(ac) ac.value = g.accent||'';
      if (!$('url').value && g.url) $('url').value = g.url;
      if (!$('token').value && g.token){ $('token').value = g.token; save(); }
      updateConnVisibility(); scheduleLoad(); loadPlaylists(); loadServices();
    }
  };
}
</script>
</body>
</html>
