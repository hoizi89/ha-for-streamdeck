function updateConnVisibility(){ const has = document.getElementById('url').value && document.getElementById('token').value; const b=document.getElementById('connBox'); if(b) b.style.display = has ? 'none' : ''; }
function setEntityName(){ const id=settings.entity; let name=id||'—'; const e=allEntities.find(x=>x.id===id); if(e) name=e.name; const el=document.getElementById('entityName'); if(el) el.textContent=name; }
function updateEntityVisibility(){ const has=!!settings.entity; const box=document.getElementById('entityBox'), sum=document.getElementById('entitySummary'); if(box) box.style.display=has?'none':''; if(sum) sum.style.display=has?'':'none'; setEntityName(); }
function showRow(id, on){ const el=document.getElementById(id); if(!el) return; const row=el.closest('.row'); if(row) row.style.display = on ? '' : 'none'; }
function updateFieldVisibility(){
  const d = (document.getElementById('display')||{}).value || '';
  const isNumber = (d === '');
  const canPress = isNumber || d==='camera';   // a camera tile can also trigger an action on tap (e.g. open door)
  const info = allEntities.find(e=>e.id===settings.entity) || null;
  const numericOk = isNumber && entityIsNumeric(info);   // warn thresholds only make sense for numeric values
  showRow('icon', isNumber);
  showRow('warn', numericOk); showRow('color1', numericOk); showRow('warn2', numericOk); showRow('color2', numericOk);
  showRow('press', canPress);
  const p = (document.getElementById('press')||{}).value || '';
  showRow('url2', canPress && p==='url');
  showRow('service', canPress && p==='service');
  const hint = document.querySelector('.hint[data-i18n="warnHint"]'); if(hint) hint.style.display = numericOk ? '' : 'none';
  const isLight = (d === 'light');
  const realLight = (settings.entity||'').split('.')[0]==='light';   // switch/fan/etc. aren't real lights
  showRow('lightstyle', isLight && realLight);   // non-lights: only the HA icon makes sense
  showRow('oncolor', isLight && realLight);       // "light colour" is meaningless for a switch
  showRow('lightlabel', isLight);
  showRow('lightpress', isLight);
  const lp = (document.getElementById('lightpress')||{}).value || '';
  const multiScene = (lp==='scenecycle' || lp==='scenehold');   // both use the scene list
  showRow('scene', isLight && (lp==='scene' || lp==='scenetoggle' || multiScene));
  showRow('scene2', isLight && multiScene);
  showRow('scene3', isLight && multiScene);
  showRow('scene4', isLight && multiScene);
  showRow('batorient', d === 'battery');
  showRow('lockpress', d === 'lock');
  showRow('lockconfirm', d === 'lock');
  showRow('lockoncolor', d === 'lock');
  const lch = document.querySelector('.hint[data-i18n="lockconfirmHint"]'); if(lch) lch.style.display = (d==='lock') ? '' : 'none';
  showRow('vacuumpress', d === 'vacuum');
  showRow('trendhours', d === 'trend');
  showRow('camrate', d === 'camera');
  showRow('coverpress', d === 'cover');
  showRow('climatepress', d === 'climate');
  const lpv = (document.getElementById('longpress')||{}).value || '';   // long-press secondary action (any display)
  showRow('longurl', lpv==='url');
  showRow('longservice', lpv==='service');
}
// only offer display modes that make sense for the picked entity
const DISPLAY_OPTS = [['','disp_num'],['light','disp_light'],['lock','disp_lock'],['climate','disp_climate'],['cover','disp_cover'],['vacuum','disp_vacuum'],['camera','disp_camera'],['weather','disp_weather'],['presence','disp_presence'],['battery','disp_bat'],['bar','disp_bar'],['trend','disp_trend'],['action','disp_action']];
// is the picked entity a numeric value? (has a unit, a numeric device_class, or a parseable state)
function entityIsNumeric(info){
  if (!info) return true;                        // unknown → don't hide anything
  if (info.unit) return true;
  const numDc = ['battery','humidity','temperature','power','energy','current','voltage','pressure','illuminance','pm25','carbon_dioxide','frequency','signal_strength','moisture','speed','data_rate','apparent_power','reactive_power'];
  if (numDc.indexOf(info.dc)>=0) return true;
  return !isNaN(parseFloat(info.state));
}
function displayAllowed(val, info){
  const dom=info&&info.domain, unit=info&&info.unit, dc=info&&info.dc;
  if (val==='') return true;                                   // Zahl always
  if (val==='light') return ['light','switch','input_boolean','fan','siren','humidifier'].indexOf(dom)>=0;
  if (val==='lock') return dom==='lock';
  if (val==='vacuum') return dom==='vacuum';
  if (val==='camera') return dom==='camera' || dom==='image';
  if (val==='action') return ['button','input_button','script','scene','automation'].indexOf(dom)>=0;
  if (val==='weather') return dom==='weather';
  if (val==='presence') return dom==='person' || dom==='device_tracker';
  if (val==='cover') return dom==='cover';
  if (val==='climate') return dom==='climate';
  // battery/bar only for a 0-100 % value (battery level, humidity, valve position …)
  if (val==='battery'||val==='bar') return unit==='%' || ['battery','humidity','moisture','battery_charging'].indexOf(dc)>=0;
  if (val==='trend') return ['sensor','number','input_number'].indexOf(dom)>=0 || !!unit;   // any recorded numeric sensor
  return true;
}
function updateDisplayOptions(){
  const sel=$('display'); if(!sel) return;
  const info = allEntities.length ? (allEntities.find(e=>e.id===settings.entity)||null) : null;
  const want = settings.display || sel.value || '';
  sel.innerHTML='';
  DISPLAY_OPTS.forEach(([val,key])=>{
    if(info && !displayAllowed(val, info)) return;             // known entity → drop unsuitable modes
    const o=document.createElement('option'); o.value=val; o.textContent=(L&&L[key])||key; sel.appendChild(o);
  });
  if(Array.from(sel.options).some(o=>o.value===want)) sel.value=want;
  else { sel.value=''; if(settings.display){ settings.display=''; if(!rendering) save(); } }
  updateFieldVisibility();
}

let ws=null, uuid=null, settings={};
const $ = id => document.getElementById(id);
const fields = ['url','token','entity','display','title','namesize','keybg','lightstyle','oncolor','lightlabel','lightpress','scene','scene2','scene3','scene4','batorient','lockpress','lockconfirm','lockoncolor','vacuumpress','trendhours','camrate','coverpress','climatepress','icon','warn','warn2','color1','color2','press','url2','service','longpress','longurl','longservice'];

let globalSettings = {};
function writeGlobal(){
  globalSettings.url = $('url').value;
  globalSettings.token = $('token').value;
  const bt = $('bgtheme'); if (bt) globalSettings.bg = bt.value;
  const ac = $('accent'); if (ac) globalSettings.accent = ac.value;
  if (ws && ws.readyState===1) ws.send(JSON.stringify({ event:'setGlobalSettings', context:uuid, payload:globalSettings }));
}
function save(){
  fields.forEach(f => { if (f!=='entity') settings[f] = $(f).value; });
  const ev = $('entity').value;
  if (ev) settings.entity = ev;          // keep chosen entity – never wipe it with an empty value
  if (ws && ws.readyState===1){
    ws.send(JSON.stringify({ event:'setSettings', context:uuid, payload:settings }));
    if ($('url').value && $('token').value) writeGlobal();
  }
}
document.addEventListener('input', e => {
  if (rendering) return;
  if (fields.indexOf(e.target.id)>=0) save();
  if (e.target.id==='url'||e.target.id==='token') scheduleLoad();
  if (e.target.id==='search') renderOptions();
});
document.addEventListener('change', e => {
  if (rendering) return;
  if (fields.indexOf(e.target.id)>=0) save();
  if (e.target.id==='domain') renderOptions();
  if (e.target.id==='entity'){
    updateEntityVisibility();                               // collapse list after picking
    const id = $('entity').value;
    if ((id.indexOf('light.')===0 || id.indexOf('switch.')===0) && !$('display').value){
      $('display').value='light'; settings.display='light';           // smart default for lights/switches
      if (id.indexOf('switch.')===0 && !settings.lightstyle){          // switches suit the real HA icon, not a bulb
        $('lightstyle').value='icon'; settings.lightstyle='icon';
      }
      save();
    } else if (id.indexOf('lock.')===0 && !$('display').value){
      $('display').value='lock'; settings.display='lock'; save();               // smart default for locks
    } else if (id.indexOf('vacuum.')===0 && !$('display').value){
      $('display').value='vacuum'; settings.display='vacuum'; save();
    } else if ((id.indexOf('camera.')===0 || id.indexOf('image.')===0) && !$('display').value){
      $('display').value='camera'; settings.display='camera'; save();
    } else if ((id.indexOf('button.')===0 || id.indexOf('input_button.')===0 || id.indexOf('script.')===0 || id.indexOf('automation.')===0) && !$('display').value){
      $('display').value='action'; settings.display='action'; save();
    } else if (id.indexOf('weather.')===0 && !$('display').value){
      $('display').value='weather'; settings.display='weather'; save();
    } else if ((id.indexOf('person.')===0 || id.indexOf('device_tracker.')===0) && !$('display').value){
      $('display').value='presence'; settings.display='presence'; save();
    } else if (id.indexOf('cover.')===0 && !$('display').value){
      $('display').value='cover'; settings.display='cover'; save();
    } else if (id.indexOf('climate.')===0 && !$('display').value){
      $('display').value='climate'; settings.display='climate'; save();
    }
    updateDisplayOptions();
    updateFieldVisibility();
  }
  if (e.target.id==='display' || e.target.id==='press' || e.target.id==='lightpress' || e.target.id==='longpress') updateFieldVisibility();
  if (e.target.id==='bgtheme'){ globalSettings.bg=$('bgtheme').value; writeGlobal(); }
  if (e.target.id==='accent'){ globalSettings.accent=$('accent').value; writeGlobal(); }
});

let loadTimer=null, haWs=null, allEntities=[], rendering=false;
function scheduleLoad(){ clearTimeout(loadTimer); loadTimer=setTimeout(loadEntities, 500); }
function renderOptions(){
  rendering = true;
  const prefix=$('domain').value;
  const q=($('search').value||'').toLowerCase();
  const cur=settings.entity || $('entity').value;
  const list = allEntities.filter(e => (!prefix||e.id.indexOf(prefix)===0) && (!q||e.name.toLowerCase().indexOf(q)>=0));
  const sel=$('entity'); sel.innerHTML='';
  list.slice(0,300).forEach(it=>{ const o=document.createElement('option'); o.value=it.id; o.textContent=it.name; sel.appendChild(o); });
  if(cur){ if(!list.some(i=>i.id===cur)){ const o=document.createElement('option'); o.value=cur; o.textContent=cur; sel.appendChild(o);} sel.value=cur; }
  rendering = false;
  setEntityName();
  renderScenes();
  updateDisplayOptions();
}
function renderScenes(){
  const list=allEntities.filter(e=>e.id.indexOf('scene.')===0);
  ['scene','scene2','scene3','scene4'].forEach(id=>{
    const sel=document.getElementById(id); if(!sel || sel.tagName!=='SELECT') return;
    const cur=settings[id] || sel.value;
    sel.innerHTML='';
    const none=document.createElement('option'); none.value=''; none.textContent='—'; sel.appendChild(none);
    list.forEach(it=>{ const o=document.createElement('option'); o.value=it.id; o.textContent=it.name; sel.appendChild(o); });
    if(cur){ if(!list.some(i=>i.id===cur)){ const o=document.createElement('option'); o.value=cur; o.textContent=cur; sel.appendChild(o);} sel.value=cur; }
  });
}
function loadEntities(){
  const url=$('url').value, token=$('token').value;
  if(!url||!token) return;
  let wsUrl=url.replace(/\/+$/,'')+'/api/websocket'; wsUrl=wsUrl.replace(/^http:/,'ws:').replace(/^https:/,'wss:');
  try{ if(haWs) haWs.close(); haWs=new WebSocket(wsUrl); }catch(e){ return; }
  let id=1, getId=0;
  haWs.onmessage=(ev)=>{
    let m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
    if(m.type==='auth_required') haWs.send(JSON.stringify({type:'auth',access_token:token}));
    else if(m.type==='auth_ok'){ getId=id; haWs.send(JSON.stringify({id:id++,type:'get_states'})); }
    else if(m.type==='result' && m.id===getId && Array.isArray(m.result)){
      allEntities=m.result.map(s=>({id:s.entity_id,name:((s.attributes&&s.attributes.friendly_name)||s.entity_id)+' — '+s.entity_id, domain:s.entity_id.split('.')[0], dc:(s.attributes&&s.attributes.device_class)||'', unit:(s.attributes&&s.attributes.unit_of_measurement)||'', state:s.state}))
        .sort((a,b)=>a.name.localeCompare(b.name));
      renderOptions(); haWs.close();
    }
  };
  haWs.onerror=()=>{};
}

function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo){
  uuid = inUUID;
  try { const info=JSON.parse(inInfo); const lang=(info.application&&info.application.language||'en').slice(0,2); L = I18N[lang]||I18N.en; } catch(e){}
  applyLang();
  try { settings = JSON.parse(inActionInfo).payload.settings || {}; } catch(e){ settings = {}; }
  fields.forEach(f => { if (settings[f]!=null && $(f)) $(f).value = settings[f]; });
  $('connToggle').addEventListener('click', e=>{ e.preventDefault(); const b=$('connBox'); b.style.display = (b.style.display==='none') ? '' : 'none'; });
  const egb=$('editGlobalBg'); if(egb) egb.addEventListener('click', e=>{ e.preventDefault(); $('connBox').style.display=''; const bt=$('bgtheme'); if(bt){ bt.focus(); bt.scrollIntoView({block:'center'}); } });
  updateConnVisibility();
  $('entityEdit').addEventListener('click', e=>{ e.preventDefault(); $('entityBox').style.display=''; $('entitySummary').style.display='none'; });
  updateEntityVisibility();
  updateFieldVisibility();
  ws = new WebSocket('ws://127.0.0.1:' + inPort);
  ws.onopen = ()=>{
    ws.send(JSON.stringify({ event:inRegisterEvent, uuid:inUUID }));
    ws.send(JSON.stringify({ event:'getGlobalSettings', context:inUUID }));
    scheduleLoad();
  };
  ws.onmessage = (ev)=>{
    let m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
    if (m.event==='didReceiveSettings' && m.payload && m.payload.settings){
      settings = m.payload.settings;
      fields.forEach(f => { if (settings[f]!=null && $(f)) $(f).value = settings[f]; });
      renderOptions(); updateEntityVisibility(); updateConnVisibility(); updateFieldVisibility();
    } else if (m.event==='didReceiveGlobalSettings' && m.payload && m.payload.settings){
      const g = m.payload.settings;
      globalSettings = Object.assign({}, g);
      const bt=$('bgtheme'); if(bt) bt.value = g.bg||'';
      const ac=$('accent'); if(ac) ac.value = g.accent||'';
      if (!$('url').value && g.url) $('url').value = g.url;
      if (!$('token').value && g.token){ $('token').value = g.token; save(); }
      updateConnVisibility();
      scheduleLoad();
    }
  };
}
</script>
