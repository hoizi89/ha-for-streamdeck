<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"><title>HA Tiles</title>
<style>@font-face{ font-family:'MDI'; src:url('fonts/mdi.woff2') format('woff2'); font-display:block; }</style>
</head>
<body>
<canvas id="cv" width="144" height="144" style="display:none"></canvas>
<script src="mdi-icons.js"></script>
<script>
// ---- Stream Deck <-> Home Assistant bridge (classic SDK, no build step) ----

let sd = null;
let myUUID = null;
let GLOBAL = {};               // shared connection { url, token } stored once
let STARTED = {};              // player entity_id -> last ma_media started from the deck (for playlist "active" marking)
function persistStarted(){ GLOBAL.started = STARTED; sdSend({ event:'setGlobalSettings', context:myUUID, payload:GLOBAL }); }
const SCENEIDX = {};           // context -> current index for scene cycling
const LOCKPEND = {};           // context -> timestamp of first press (double-press confirm)
const HOLD = {};               // context -> { timer, fired } while a "hold to confirm" key is down
const LOCKHINT = {};           // context -> 'again' | 'hold' | null  (confirm overlay on the tile)
const CYCLE = {};              // context -> { timer, stepped } while a "hold to browse scenes" key is down
const ACTFLASH = {};           // context -> timestamp of last action press (brief tile flash)
const CAMIMG = {};             // context -> last successfully loaded camera/image snapshot Image
let ANIM = 0;                  // frame counter for the equalizer animation
function animateActive(){      // redraw only currently-playing "play" tiles so their eq bars animate
  ANIM++;
  Object.keys(ctxInfo).forEach(ctx => {
    const info = ctxInfo[ctx];
    if (!info || info.action !== 'com.hoizi.homeassistant.media') return;
    const r = info.settings.role || 'playpause';
    if (['play','playpause','nowplaying'].indexOf(r) < 0) return;   // only tiles that animate (eq bars / progress)
    const st = stateFor(info.settings);
    if (st && st.state === 'playing') draw(ctx);
  });
}
setInterval(animateActive, 340);
// ---- camera / image snapshot refresh ----
function refreshCam(context, cfg){
  const st = stateFor(cfg);
  const ep = st && st.attributes && st.attributes.entity_picture;   // signed /api/(camera|image)_proxy/… url
  if (!ep){ draw(context); return; }
  const base = (U(cfg)||'').replace(/\/+$/,'');
  const url = (ep.charAt(0)==='/' ? base+ep : ep) + (ep.indexOf('?')>=0?'&':'?') + 'sd=' + Date.now();  // cache-buster → fresh frame
  const img = new Image(); img.crossOrigin = 'anonymous';
  img.onload = ()=>{ CAMIMG[context] = img; draw(context); };
  img.onerror = ()=>{};
  img.src = url;
}
// ---- sensor history / sparkline ----
const TREND = {};     // context -> { points:[…] } sampled history values
function refreshTrend(context, cfg){
  const entity = cfg.entity; if (!entity) return;
  const c = haConns[haKey(U(cfg), T(cfg))];
  if (!c || !c.ready) return;
  const hours = parseFloat(cfg.trendhours) || 6;
  const id = c.id++;
  c.pending[id] = (m)=>{
    let arr = m.result && (m.result[entity] || (Array.isArray(m.result) ? m.result[0] : null));
    if (!Array.isArray(arr)) return;
    const pts = [];
    arr.forEach(e=>{ const v = parseFloat(e.s!=null ? e.s : e.state); if (!isNaN(v)) pts.push(v); });
    let out = pts;
    if (pts.length > 80){ out = []; const step = pts.length/80; for (let i=0;i<80;i++) out.push(pts[Math.floor(i*step)]); }  // downsample
    TREND[context] = { points: out };
    draw(context);
  };
  const end = new Date().toISOString();
  const start = new Date(Date.now() - hours*3600e3).toISOString();
  c.ws.send(JSON.stringify({ id, type:'history/history_during_period', start_time:start, end_time:end, entity_ids:[entity], minimal_response:true, no_attributes:true }));
}
function refreshAllTrends(){ Object.keys(ctxInfo).forEach(ctx=>{ const i=ctxInfo[ctx]; if (i && i.settings.display==='trend') refreshTrend(ctx, i.settings); }); }
setInterval(refreshAllTrends, 120000);

const CAMLAST = {};   // context -> last camera refresh (honours per-tile refresh rate)
setInterval(()=>{
  const now = Date.now();
  Object.keys(ctxInfo).forEach(ctx=>{
    const i = ctxInfo[ctx];
    if (!i || i.settings.display!=='camera') return;
    const rate = (parseFloat(i.settings.camrate)||4) * 1000;
    if (now - (CAMLAST[ctx]||0) >= rate){ CAMLAST[ctx] = now; refreshCam(ctx, i.settings); }
  });
}, 1000);
let LANG = 'de';
const STATE_L = {
  de: { on:'An', off:'Aus', open:'Offen', closed:'Geschlossen', opening:'Öffnet', closing:'Schließt',
    home:'Zuhause', not_home:'Unterwegs', playing:'Spielt', paused:'Pause', idle:'Bereit', standby:'Standby',
    heat:'Heizen', cool:'Kühlen', auto:'Auto', dry:'Trocknen', fan_only:'Lüften', heat_cool:'Auto',
    heating:'Heizt', cooling:'Kühlt', 'off':'Aus', docked:'Dock', cleaning:'Reinigt', returning:'Rückkehr', error:'Fehler',
    locked:'Verriegelt', unlocked:'Entriegelt', jammed:'Klemmt', locking:'Verriegelt…', unlocking:'Entriegelt…',
    active:'Aktiv', mowing:'Mäht', paused_:'Pause',
    charging:'Lädt', discharging:'Entlädt', unavailable:'—', unknown:'—', on_:'An' }
};
function localState(raw){
  if (raw==null || raw==='') return '—';
  const m = STATE_L[LANG]; if (m && m[raw]!=null) return m[raw];
  return raw.charAt(0).toUpperCase() + raw.slice(1);
}
const ctxInfo = {};            // context -> { action, settings }
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');

// effective url/token: per-key value wins, else the global default
function U(cfg){ return (cfg && cfg.url) || GLOBAL.url; }
function T(cfg){ return (cfg && cfg.token) || GLOBAL.token; }

// ---- Home Assistant connection (one per url+token) ----
const haConns = {};
function haKey(url, token){ return (url||'') + '|' + (token||''); }

function connectHA(url, token){
  const key = haKey(url, token);
  if (!url || !token) return null;
  let c = haConns[key];
  if (c && (c.ready || c.connecting)) return c;
  c = haConns[key] = { states:{}, ready:false, connecting:true, id:1, url, token, pending:{} };
  let wsUrl = url.replace(/\/+$/,'') + '/api/websocket';
  wsUrl = wsUrl.replace(/^http:/,'ws:').replace(/^https:/,'wss:');
  try { c.ws = new WebSocket(wsUrl); } catch(e){ c.connecting=false; return c; }
  c.ws.onclose = ()=>{ c.ready=false; c.connecting=false; renderAll(); setTimeout(()=>connectHA(url,token), 5000); };
  c.ws.onmessage = (ev)=>{
    let m; try { m = JSON.parse(ev.data); } catch(e){ return; }
    if (m.type === 'auth_required') {
      c.ws.send(JSON.stringify({ type:'auth', access_token: token }));
    } else if (m.type === 'auth_ok') {
      c.ready = true; c.connecting = false;
      c.ws.send(JSON.stringify({ id: c.id++, type:'subscribe_events', event_type:'state_changed' }));
      c.getStatesId = c.id;
      c.ws.send(JSON.stringify({ id: c.id++, type:'get_states' }));
    } else if (m.type === 'auth_invalid') {
      c.ready = false; c.connecting = false;
    } else if (m.type === 'result' && c.pending[m.id]) {
      const cb = c.pending[m.id]; delete c.pending[m.id]; cb(m);          // history/other one-off queries
    } else if (m.type === 'result' && m.id === c.getStatesId && Array.isArray(m.result)) {
      m.result.forEach(s => { c.states[s.entity_id] = s; });
      renderAll(); refreshAllTrends();
    } else if (m.type === 'event' && m.event && m.event.event_type === 'state_changed') {
      const d = m.event.data;
      if (d && d.new_state) { c.states[d.entity_id] = d.new_state; renderForEntity(d.entity_id); }
    }
  };
  return c;
}

function haCall(cfg, domain, service, entity_id, data){
  const c = haConns[haKey(U(cfg), T(cfg))];
  if (!c || !c.ready) return;
  const msg = { id: c.id++, type:'call_service', domain, service };
  if (entity_id) msg.target = { entity_id };    // scripts/scenes/buttons take no entity target
  if (data) msg.service_data = data;
  c.ws.send(JSON.stringify(msg));
}

function stateFor(cfg){
  const c = haConns[haKey(U(cfg), T(cfg))];
  return c ? (c.states[cfg.entity] || null) : null;
}

// ---- rendering helpers ----
function roundRectPath(x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y);
  cx.arcTo(x+w,y,x+w,y+h,r);
  cx.arcTo(x+w,y+h,x,y+h,r);
  cx.arcTo(x,y+h,x,y,r);
  cx.arcTo(x,y,x+w,y,r);
  cx.closePath();
}
function drawBg(top, bottom, glow){
  cx.clearRect(0,0,144,144);
  roundRectPath(4,4,136,136,20);
  const g = cx.createLinearGradient(0,0,0,144);
  g.addColorStop(0, top); g.addColorStop(1, bottom);
  cx.fillStyle = g; cx.fill();
  // subtle inner highlight
  roundRectPath(4,4,136,68,20);
  cx.fillStyle = 'rgba(255,255,255,0.05)'; cx.fill();
  if (glow){ cx.lineWidth=3; roundRectPath(5,5,134,134,19); cx.strokeStyle=glow; cx.stroke(); }
}
const THEMES = {
  '':     { top:'#33414f', bot:'#161d25' },
  black:  { top:'#2a2a2a', bot:'#000000' },
  gray:   { top:'#4b4b4b', bot:'#1e1e1e' },
  blue:   { top:'#2c4a6e', bot:'#0e1b2b' },
  green:  { top:'#2c4a3a', bot:'#0e1b14' },
  purple: { top:'#3d2c5a', bot:'#160e26' },
  teal:   { top:'#1f4a4a', bot:'#0a1f1f' }
};
function bgTheme(cfg){ const k = (cfg && cfg.keybg) || GLOBAL.bg || ''; return THEMES[k] || THEMES['']; }
// colour used when a media tile is actively playing (global "Aktiv-Farbe")
const ACCENTS = {
  '':     { top:'#2ec26a', bot:'#177a41', glow:'#57e08e' },
  blue:   { top:'#3d7be0', bot:'#1c3f7a', glow:'#82b0ff' },
  purple: { top:'#8a5cd6', bot:'#4a2c8f', glow:'#c1a3ff' },
  orange: { top:'#e6902e', bot:'#8a4f0c', glow:'#ffc078' },
  red:    { top:'#e0524a', bot:'#8a1f18', glow:'#ff9a90' },
  teal:   { top:'#1fb7b0', bot:'#0d5f5b', glow:'#6ff0e8' },
  pink:   { top:'#e05a9c', bot:'#8a2058', glow:'#ffa0cf' }
};
function accent(){ return ACCENTS[GLOBAL.accent||''] || ACCENTS['']; }
function glyphSym(ch, y, size, color){
  cx.fillStyle = color || '#ffffff';
  cx.textAlign='center';
  cx.font = '700 ' + size + 'px "Segoe UI Symbol","Segoe UI",Arial,sans-serif';
  cx.fillText(ch, 72, y);
}
function drawSpeaker(cx0, cy, plus){
  cx.fillStyle = '#ffffff';
  // speaker body + cone
  cx.beginPath();
  cx.moveTo(cx0-24, cy-9); cx.lineTo(cx0-12, cy-9); cx.lineTo(cx0+2, cy-22);
  cx.lineTo(cx0+2, cy+22); cx.lineTo(cx0-12, cy+9); cx.lineTo(cx0-24, cy+9);
  cx.closePath(); cx.fill();
  // plus / minus
  cx.strokeStyle = '#ffffff'; cx.lineCap='round'; cx.lineWidth = 6;
  cx.beginPath();
  cx.moveTo(cx0+13, cy); cx.lineTo(cx0+29, cy);
  if (plus){ cx.moveTo(cx0+21, cy-8); cx.lineTo(cx0+21, cy+8); }
  cx.stroke();
}
function wrapText(txt, maxW){
  const words = (txt||'').split(' ');
  const lines = []; let cur = '';
  for (const w of words){
    const t = cur ? cur+' '+w : w;
    if (cx.measureText(t).width <= maxW || !cur) cur = t; else { lines.push(cur); cur = w; }
  }
  if (cur) lines.push(cur);
  return lines;
}
function bottomName(name, scale, yShift){
  if (scale === 0) return;               // name hidden
  scale = scale || 1; yShift = yShift || 0;
  name = (name||'').trim();
  cx.fillStyle='#dbe5f0'; cx.textAlign='center';
  const big = Math.round(19*scale);
  cx.font='700 '+big+'px "Segoe UI",Arial,sans-serif';
  if (cx.measureText(name).width <= 132){ cx.fillText(name, 72, 133-yShift, 132); return; }
  // wrap onto two lines by words
  const sm = Math.round(16*scale);
  cx.font='700 '+sm+'px "Segoe UI",Arial,sans-serif';
  const words = name.split(' ');
  if (words.length===1){                                  // one long word → split across two lines, don't truncate
    let cut = name.length;
    while (cut>1 && cx.measureText(name.slice(0,cut)).width>132) cut--;
    let a = name.slice(0,cut), b = name.slice(cut);
    while (cx.measureText(b).width>132 && b.length>2) b = b.slice(0,-2)+'…';
    cx.fillText(a, 72, 118 + (big-19) - yShift, 132);
    cx.fillText(b, 72, 138 - yShift, 132);
    return;
  }
  let l1='', l2='';
  for (const w of words){
    if (!l2 && cx.measureText((l1?l1+' ':'')+w).width <= 130) l1 = (l1?l1+' ':'')+w;
    else l2 = (l2?l2+' ':'')+w;
  }
  if (!l2){ cx.fillText(name.length>13?name.slice(0,12)+'…':name, 72, 133-yShift, 132); return; }
  while (cx.measureText(l2).width>132 && l2.length>2) l2 = l2.slice(0,-2)+'…';
  cx.fillText(l1, 72, 118+ (big-19) - yShift, 132);
  cx.fillText(l2, 72, 138 - yShift, 132);
}
function nameScale(cfg){ return cfg.namesize==='off'?0 : cfg.namesize==='S'?0.78 : cfg.namesize==='L'?1.28 : 1; }

// 3-zone color by fill fraction (0..1): green / orange / red
function zoneColor(p){
  if (p >= 0.5) return '#39d98a';
  if (p >= 0.2) return '#ffb04a';
  return '#ff5a52';
}
function outlineText(txt, x, y, size){
  cx.textAlign='center'; cx.font='700 '+size+'px "Segoe UI",Arial,sans-serif';
  cx.lineWidth=4; cx.strokeStyle='rgba(0,0,0,0.55)'; cx.strokeText(txt, x, y);
  cx.fillStyle='#ffffff'; cx.fillText(txt, x, y);
}
function drawBattery(context, cfg, num){
  drawBg(bgTheme(cfg).top, bgTheme(cfg).bot, null);
  const p = isNaN(num) ? 0 : Math.max(0, Math.min(100, num)) / 100;
  const col = zoneColor(p);
  const nameOn = nameScale(cfg) !== 0;
  const pct = isNaN(num) ? '—' : Math.round(num) + '%';
  if (cfg.batorient === 'v'){
    // standing / vertical battery
    const dy = nameOn ? 0 : 14;
    roundRectPath(60, 12+dy, 24, 8, 4); cx.fillStyle = '#8aa0b4'; cx.fill();
    roundRectPath(42, 20+dy, 60, 74, 11); cx.fillStyle = '#0e141b'; cx.fill();
    cx.lineWidth = 3; roundRectPath(42, 20+dy, 60, 74, 11); cx.strokeStyle = '#8aa0b4'; cx.stroke();
    const iB = 89+dy, iT = 25+dy, fh = Math.max(0, (iB-iT) * p);
    if (fh > 0){ roundRectPath(47, iB-fh, 50, fh, 6); cx.fillStyle = col; cx.fill(); }
    outlineText(pct, 72, 64+dy, 24);
  } else {
    // lying / horizontal battery (default)
    const cyc = nameOn ? 58 : 74;
    const bx = 20, bw = 94, bh = 46, by = cyc - bh/2;
    roundRectPath(bx+bw, by + bh/2 - 10, 8, 20, 3); cx.fillStyle = '#8aa0b4'; cx.fill();
    roundRectPath(bx, by, bw, bh, 11); cx.fillStyle = '#0e141b'; cx.fill();
    cx.lineWidth = 3; roundRectPath(bx, by, bw, bh, 11); cx.strokeStyle = '#8aa0b4'; cx.stroke();
    const pad = 5, fw = (bw - pad*2) * p;
    if (fw > 0){ roundRectPath(bx+pad, by+pad, Math.max(6, fw), bh-pad*2, 6); cx.fillStyle = col; cx.fill(); }
    outlineText(pct, bx + bw/2, cyc + 8, 24);
  }
  bottomName(cfg.title || 'Batterie', nameScale(cfg));
  push(context);
}
function drawBar(context, cfg, num){
  drawBg(bgTheme(cfg).top, bgTheme(cfg).bot, null);
  const p = isNaN(num) ? 0 : Math.max(0, Math.min(100, num)) / 100;
  const col = zoneColor(p);
  outlineText(isNaN(num) ? '—' : Math.round(num) + '%', 72, 58, 30);
  roundRectPath(18, 74, 108, 22, 11); cx.fillStyle = '#0e141b'; cx.fill();
  const w = Math.max(0, 108 * p);
  if (w > 0){ roundRectPath(18, 74, Math.max(14, w), 22, 11); cx.fillStyle = col; cx.fill(); }
  bottomName(cfg.title || (cfg.entity||''), nameScale(cfg));
  push(context);
}
function lightColor(st){
  if (st && st.attributes && Array.isArray(st.attributes.rgb_color)){
    const c = st.attributes.rgb_color; return 'rgb('+c[0]+','+c[1]+','+c[2]+')';
  }
  return '#ffd257';
}
function hexPath(cx0, cy, r){
  cx.beginPath();
  for (let i=0;i<6;i++){ const a=Math.PI/180*(60*i-90); const x=cx0+r*Math.cos(a), y=cy+r*Math.sin(a); i?cx.lineTo(x,y):cx.moveTo(x,y); }
  cx.closePath();
}
function lightLabel(cfg, st, on){
  const mode = cfg.lightlabel || '';
  if (mode==='none') return '';
  const bri = (st && st.attributes && st.attributes.brightness!=null) ? Math.round(st.attributes.brightness/255*100)+'%' : null;
  if (mode==='onoff') return on ? 'AN' : 'AUS';
  if (mode==='brightness') return on ? (bri||'AN') : 'AUS';
  return on ? (bri||'AN') : 'AUS';   // auto
}
function drawClimate(context, cfg, st){
  const a = (st && st.attributes) || {};
  const cur = a.current_temperature;
  const target = a.temperature;
  const action = a.hvac_action || (st ? st.state : '');
  const off = st && st.state==='off';
  const heating = !off && (action==='heating' || (st && st.state==='heat' && action!=='idle'));
  const cooling = !off && (action==='cooling' || (st && st.state==='cool'));
  const modeCol = heating ? '#ff9a5a' : (cooling ? '#6ab8ff' : '#9fb3c8');
  const glow = heating ? '#ff8a4a' : (cooling ? '#4aa8ff' : null);   // mode is shown purely via the border glow
  drawBg(bgTheme(cfg).top, bgTheme(cfg).bot, glow);
  const nameOn = nameScale(cfg)!==0;
  // setpoint: small, top-right
  if (target!=null && !off){
    cx.textAlign='right'; cx.fillStyle=modeCol; cx.font='700 16px "Segoe UI",Arial,sans-serif';
    cx.fillText('→'+(Math.round(target*10)/10)+'°', 132, 28);
  }
  // +/- control badge: top-left (only on warmer/cooler tiles)
  if (cfg.climatepress==='warmer' || cfg.climatepress==='cooler'){
    const warm = cfg.climatepress==='warmer';
    cx.fillStyle = warm ? '#ff8a4a' : '#4aa8ff';
    cx.beginPath(); cx.arc(24, 26, 14, 0, Math.PI*2); cx.fill();
    cx.fillStyle='#fff'; cx.textAlign='center'; cx.font='700 24px "Segoe UI",Arial,sans-serif'; cx.fillText(warm?'+':'−', 24, 34);
  }
  // current temperature — the hero, big and centred
  cx.textAlign='center'; cx.fillStyle = off ? '#8ea3b8' : '#ffffff';
  cx.font='700 50px "Segoe UI",Arial,sans-serif';
  cx.fillText(cur!=null ? (Math.round(cur*10)/10)+'°' : (off ? (LANG==='de'?'Aus':'Off') : '—'), 72, nameOn ? 84 : 92, 138);
  bottomName(cfg.title || a.friendly_name || cfg.entity || '', nameScale(cfg));
  push(context);
}
function drawLight(context, cfg, st){
  const on = st && st.state === 'on';
  const isRealLight = (cfg.entity||'').split('.')[0]==='light';   // only real lights have a colour / should "glow"
  const style = isRealLight ? (cfg.lightstyle || 'bulb') : 'icon';   // switches/fans/etc: HA icon only, no bulb
  const useAccent = cfg.oncolor==='accent';                       // "Aktiv-Farbe" colours the whole tile when on
  const realCol = on ? (isRealLight ? lightColor(st) : '#e8eef5') : '#5b6b7a';   // no fake light colour for non-lights
  if (on && useAccent){ const a = accent(); drawBg(a.top, a.bot, a.glow); }
  else drawBg(bgTheme(cfg).top, bgTheme(cfg).bot, null);          // no border ring – glow comes from the shape's shadow
  const col = (on && useAccent) ? '#ffffff' : realCol;           // on accent bg the icon stays white/visible
  const dy = nameScale(cfg)===0 ? 8 : 0;
  cx.save();
  if (on && (isRealLight || useAccent)){ cx.shadowColor = col; cx.shadowBlur = 20; }   // only real lights emit light
  cx.fillStyle = col; cx.strokeStyle = col;
  if (style==='strip'){
    roundRectPath(22, 46+dy, 100, 26, 13); cx.fill();
  } else if (style==='hexagon'){
    hexPath(72, 56+dy, 34); cx.fill();
  } else if (style==='ring'){
    cx.lineWidth = 15; cx.beginPath(); cx.arc(72, 56+dy, 28, 0, Math.PI*2); cx.stroke();
  } else if (style==='icon'){
    const ig = iconGlyph(cfg, st);   // real HA MDI icon (washing machine, fan …)
    if (ig){ cx.textAlign='center'; cx.fillStyle=col; cx.font = 60 + 'px ' + (ig.mdi ? '"MDI"' : '"Segoe UI Symbol","Segoe UI",Arial'); cx.fillText(ig.ch, 72, (ig.mdi?70:62)+dy); }
  } else {
    cx.beginPath(); cx.arc(72, 48+dy, 25, 0, Math.PI*2); cx.fill();
    cx.shadowBlur = 0;
    cx.fillStyle = on?'#b98f2e':'#3f4b58'; roundRectPath(61, 68+dy, 22, 14, 3); cx.fill();
    cx.fillStyle = on?'#a07d26':'#333d46'; cx.fillRect(64, 82+dy, 16, 3);
  }
  cx.restore();
  const lbl = lightLabel(cfg, st, on);
  if (lbl){ const ly = ({bulb:56, strip:67, hexagon:64, ring:64}[style]||56) + dy; outlineText(lbl, 72, ly, 20); }
  bottomName(cfg.title || (st && st.attributes && st.attributes.friendly_name) || cfg.entity || '', nameScale(cfg));
  push(context);
}
function drawLock(context, cfg, st){
  const state = st ? st.state : '';
  const locked = state==='locked' || state==='locking';
  const jammed = state==='jammed';
  const unavail = !st || state==='' || state==='unavailable' || state==='unknown';
  const hint = LOCKHINT[context] || null;               // 'again' / 'hold' while confirming
  const useAccent = cfg.lockoncolor==='accent';         // global active colour for the "locked" state
  const bgAccent = (state==='locked' && useAccent && !hint);   // fill whole tile with accent when locked
  let glow = null;
  if (hint) glow = '#ffb04a';                            // confirm pending → orange attention ring
  else if (jammed) glow = '#ff5a52';
  else if (state==='unlocked' || state==='open' || state==='unlocking') glow = '#ffb04a';
  else if (state==='locked') glow = useAccent ? accent().glow : '#57e08e';
  if (bgAccent){ const a = accent(); drawBg(a.top, a.bot, a.glow); }
  else drawBg(bgTheme(cfg).top, bgTheme(cfg).bot, glow);

  const hot = (role==='play') ? active : playing;
  if (cover) drawCoverBg(cover);
  else { const th = bgTheme(cfg), a = accent(); drawBg(hot?a.top:th.top, hot?a.bot:th.bot, hot?a.glow:null); }
  const gcol = cover ? 'rgba(255,255,255,0.92)' : '#ffffff';   // on a cover: dezent glyph + shadow for legibility
  if (cover){ cx.save(); cx.shadowColor='rgba(0,0,0,0.6)'; cx.shadowBlur=8; }
  if (role==='volup' || role==='voldown'){
    drawSpeaker(66, 76, role==='volup');
  } else if (role==='play'){
    const nm = nameScale(cfg)!==0;                       // lift icon up when a label is shown
    const iy = nm ? 80 : 92;
    if (cfg.hideicon !== '1'){
      const mdiName = MA_TYPE_ICON[cfg.ma_type||'playlist'] || 'music-note';
      const cp = window.MDI && window.MDI[mdiName];
      if (cover){                                        // over cover: small corner badge only
        if (cp){ cx.fillStyle=gcol; cx.textAlign='left'; cx.font='30px "MDI"'; cx.fillText(String.fromCodePoint(parseInt(cp,16)), 12, 38); cx.textAlign='center'; }
      } else if (cp){ cx.fillStyle=gcol; cx.textAlign='center'; cx.font='68px "MDI"'; cx.fillText(String.fromCodePoint(parseInt(cp,16)), 72, iy+3); }
      else glyphSym('♪', iy, 66, gcol);
    }
    if (active) drawEqBars(72, 26, '#ffffff', ANIM);     // animated "now playing" equalizer badge
  } else if (role === 'playpause'){
    if (!playing) glyphSym('▶', 90, cover?72:66, gcol);   // paused/idle → prominent ▶ "press to play"
    else {                                                 // playing → small dezent ⏸ hint in the corner
      cx.textAlign='left'; cx.font='700 30px "Segoe UI Symbol","Segoe UI",Arial,sans-serif';
      cx.fillStyle='rgba(255,255,255,0.85)'; cx.fillText('⏸', 12, 38); cx.textAlign='center';
    }
  } else {
    const glyph = GLYPH[role];
    if (cover){                                          // next/prev/stop over cover → subtle corner
      cx.textAlign='left'; cx.font='700 26px "Segoe UI Symbol","Segoe UI",Arial'; cx.fillStyle=gcol;
      cx.fillText(glyph, 12, 36); cx.textAlign='center';
    } else glyphSym(glyph, 92, 66, gcol);
  }
  if (cover) cx.restore();
  let label = cfg.title || '';
  if (!label){
    if (role==='playpause' && st && st.attributes && st.attributes.media_title) label = st.attributes.media_title;
    else if (role==='play') label = tgtName || ({playlist:'Playlist',radio:'Radio',album:'Album',artist:'Interpret',track:'Track'}[cfg.ma_type] || 'Wiedergabe');
    // next/prev/vol/stop: the symbol says it all – no default name unless the user sets a title
  }
  // progress only where it belongs: playpause (reflects the player) or a play tile that is itself active
  const showProg = ((role==='playpause') || (role==='play' && active)) && playing && cfg.hideprogress!=='1'
                   && st && st.attributes && (+st.attributes.media_duration) > 0;
  bottomName(label, nameScale(cfg), (role==='play'?10:0) + (showProg?11:0));   // raise text so the bar has room
  if (showProg) drawProgress(st, 133, 5);
  push(context);
}

function draw(context){
  const info = ctxInfo[context]; if (!info) return;
  if (info.action === 'com.hoizi.homeassistant.media') drawMedia(context, info.settings);
  else drawEntity(context, info.settings);
}
function renderAll(){ Object.keys(ctxInfo).forEach(draw); }
function renderForEntity(entity){
  Object.keys(ctxInfo).forEach(ctx => {
    const i = ctxInfo[ctx];
    if (i.settings.entity !== entity) return;
    if (i.settings.display==='camera') refreshCam(ctx, i.settings);   // pull a fresh frame (token may have rotated)
    else draw(ctx);
  });
}

// ---- scene helpers (scenecycle press mode) ----
function sceneList(cfg){ return [cfg.scene,cfg.scene2,cfg.scene3,cfg.scene4].filter(Boolean); }
function stepScene(context, cfg){                      // advance to the next scene in the list
  const list = sceneList(cfg); if (!list.length) return;
  const i = ((SCENEIDX[context]==null?-1:SCENEIDX[context])+1) % list.length;
  SCENEIDX[context] = i; haCall(cfg,'scene','turn_on',list[i]);
}
function toggleSceneOff(context, cfg){                 // tap: on -> off, off -> (re)activate current scene
  const s = stateFor(cfg);
  if (s && s.state==='on'){ haCall(cfg,'homeassistant','turn_off',cfg.entity); return; }
  const list = sceneList(cfg); if (!list.length) return;
  const i = SCENEIDX[context]==null ? 0 : SCENEIDX[context];
  haCall(cfg,'scene','turn_on', list[i] || list[0]);
}

// ---- Music Assistant playlist carousel ----
const MAIDX = {};     // context -> current carousel index
const MACYCLE = {};   // context -> { timer, stepped } while browsing playlists by holding
function maList(cfg){
  return [
    { id: cfg.ma_media,  name: cfg.ma_name },
    { id: cfg.ma_media2, name: cfg.ma_name2 },
    { id: cfg.ma_media3, name: cfg.ma_name3 },
    { id: cfg.ma_media4, name: cfg.ma_name4 }
  ].filter(x => x.id);
}
function maPlay(context, cfg, i){                       // start the i-th playlist (wraps around)
  const list = maList(cfg); if (!list.length) return;
  i = ((i % list.length) + list.length) % list.length;
  MAIDX[context] = i;
  const item = list[i];
  haCall(cfg,'music_assistant','play_media',cfg.entity,{ media_id:item.id, media_type:(cfg.ma_type||'playlist') });
  STARTED[cfg.entity] = item.id; persistStarted();
  renderForEntity(cfg.entity);
}

// ---- key press ----
function onKeyDown(context){
  const info = ctxInfo[context]; if (!info) return;
  const cfg = info.settings;
  if (info.action === 'com.hoizi.homeassistant.media'){
    const role = cfg.role || 'playpause';
    if (role==='playpause' || role==='nowplaying') haCall(cfg,'media_player','media_play_pause',cfg.entity);
    else if (role==='next') haCall(cfg,'media_player','media_next_track',cfg.entity);
    else if (role==='prev') haCall(cfg,'media_player','media_previous_track',cfg.entity);
    else if (role==='volup') haCall(cfg,'media_player','volume_up',cfg.entity);
    else if (role==='voldown') haCall(cfg,'media_player','volume_down',cfg.entity);
    else if (role==='stop') haCall(cfg,'media_player','media_stop',cfg.entity);
    else if (role==='play'){
      const mode = cfg.playmode || '';
      if (mode==='next'){                                   // carousel: each tap → next playlist
        maPlay(context, cfg, (MAIDX[context]==null?-1:MAIDX[context]) + 1);
      } else if (mode==='hold'){                            // carousel: tap = toggle, hold = browse (handled on keyUp)
        MACYCLE[context] = { stepped:false };
        MACYCLE[context].timer = setInterval(()=>{ if(!MACYCLE[context]) return; MACYCLE[context].stepped=true; maPlay(context, cfg, (MAIDX[context]==null?-1:MAIDX[context])+1); }, 900);
      } else if (cfg.ma_media){                             // single
        const st = stateFor(cfg);
        const cid = st && st.attributes && st.attributes.media_content_id;
        const thisActive = st && st.state==='playing' && (cid===cfg.ma_media || STARTED[cfg.entity]===cfg.ma_media);
        if (thisActive) haCall(cfg,'media_player','media_play_pause',cfg.entity);   // THIS content is running → pause
        else { haCall(cfg,'music_assistant','play_media',cfg.entity,{ media_id:cfg.ma_media, media_type:(cfg.ma_type||'playlist') }); STARTED[cfg.entity]=cfg.ma_media; persistStarted(); renderForEntity(cfg.entity); }
      }
    }
    return;
  }
  // entity action
  if (cfg.display==='light'){
    const lp = cfg.lightpress || 'toggle';
    if (lp==='on') haCall(cfg,'homeassistant','turn_on',cfg.entity);
    else if (lp==='off') haCall(cfg,'homeassistant','turn_off',cfg.entity);
    else if (lp==='scene' && cfg.scene) haCall(cfg,'scene','turn_on',cfg.scene);
    else if (lp==='scenetoggle'){
      const s = stateFor(cfg);
      if (s && s.state==='on') haCall(cfg,'homeassistant','turn_off',cfg.entity);   // on → off
      else if (cfg.scene) haCall(cfg,'scene','turn_on',cfg.scene);                   // off → activate scene
    }
    else if (lp==='scenecycle'){
      stepScene(context, cfg);                            // each press → next scene
    }
    else if (lp==='scenehold'){                           // tap = scene/off, hold = browse scenes
      if (!sceneList(cfg).length) return;
      CYCLE[context] = { stepped:false };
      CYCLE[context].timer = setInterval(()=>{ if(!CYCLE[context]) return; CYCLE[context].stepped = true; stepScene(context, cfg); }, 800);
    }
    else if (cfg.entity) haCall(cfg,'homeassistant','toggle',cfg.entity);
    return;
  }
  if (cfg.display==='climate'){
    const cp = cfg.climatepress || 'none';
    const st = stateFor(cfg);
    const cur = st && st.attributes ? st.attributes.temperature : null;
    if (cp==='warmer' && cur!=null) haCall(cfg,'climate','set_temperature',cfg.entity,{ temperature: Math.round((cur+0.5)*10)/10 });
    else if (cp==='cooler' && cur!=null) haCall(cfg,'climate','set_temperature',cfg.entity,{ temperature: Math.round((cur-0.5)*10)/10 });
    else if (cp==='toggle'){
      if (st && st.state && st.state!=='off') haCall(cfg,'climate','turn_off',cfg.entity);
      else haCall(cfg,'climate','turn_on',cfg.entity);
    }
    return;
  }
  if (cfg.display==='lock'){
    const st = stateFor(cfg);
    const state = st ? st.state : '';
    const lp = cfg.lockpress || 'toggle';
    let svc, risky;                                                       // "risky" = reduces security → confirmable
    if (lp==='lock'){ svc='lock'; risky=false; }
    else if (lp==='unlock'){ svc='unlock'; risky=true; }
    else if (lp==='open'){ svc='open'; risky=true; }                     // latch / door release
    else if (state==='locked' || state==='locking'){ svc='unlock'; risky=true; }   // toggle → unlock
    else { svc='lock'; risky=false; }                                    // toggle → lock
    const mode = cfg.lockconfirm || 'off';
    if (!risky || mode==='off'){ haCall(cfg,'lock',svc,cfg.entity); return; }
    if (mode==='hold'){                                                   // keep pressed ~0.7 s
      LOCKHINT[context] = 'hold'; draw(context);
      HOLD[context] = { fired:false };
      HOLD[context].timer = setTimeout(()=>{
        if (!HOLD[context]) return;
        HOLD[context].fired = true; LOCKHINT[context] = null;
        haCall(cfg,'lock',svc,cfg.entity); draw(context);
      }, 700);
      return;
    }
    // double-press: first press arms (shows "Nochmal!"), second within 2.5 s fires
    const now = Date.now();
    if (LOCKPEND[context] && (now - LOCKPEND[context] < 2500)){
      delete LOCKPEND[context]; LOCKHINT[context] = null;
      haCall(cfg,'lock',svc,cfg.entity); draw(context);
    } else {
      LOCKPEND[context] = now; LOCKHINT[context] = 'again'; draw(context);
      setTimeout(()=>{ if (LOCKPEND[context]===now){ delete LOCKPEND[context]; LOCKHINT[context]=null; draw(context); } }, 2500);
    }
    return;
  }
  if (cfg.display==='vacuum'){
    const vp = cfg.vacuumpress || 'toggle';
    const st = stateFor(cfg); const state = st ? st.state : '';
    if (vp==='start') haCall(cfg,'vacuum','start',cfg.entity);
    else if (vp==='return') haCall(cfg,'vacuum','return_to_base',cfg.entity);
    else if (vp==='pause') haCall(cfg,'vacuum','pause',cfg.entity);
    else if (vp==='locate') haCall(cfg,'vacuum','locate',cfg.entity);
    else if (state==='cleaning') haCall(cfg,'vacuum','return_to_base',cfg.entity);   // toggle: cleaning → dock
    else haCall(cfg,'vacuum','start',cfg.entity);                                     // else → start
    return;
  }
  if (cfg.display==='action'){
    runAction(cfg);
    ACTFLASH[context] = Date.now(); draw(context);            // brief visual feedback
    setTimeout(()=>draw(context), 360);
    return;
  }
  if (cfg.display==='cover'){
    const cpr = cfg.coverpress || 'toggle';
    const st = stateFor(cfg); const state = st ? st.state : '';
    const pos = st && st.attributes ? st.attributes.current_position : null;
    if (cpr==='open') haCall(cfg,'cover','open_cover',cfg.entity);
    else if (cpr==='close') haCall(cfg,'cover','close_cover',cfg.entity);
    else if (cpr==='stop') haCall(cfg,'cover','stop_cover',cfg.entity);
    else { const isOpen = state==='open' || (pos!=null && pos>0); haCall(cfg,'cover', isOpen?'close_cover':'open_cover', cfg.entity); }
    return;
  }
  const press = cfg.press || 'none';
  if (press==='toggle' && cfg.entity) haCall(cfg,'homeassistant','toggle',cfg.entity);
  else if (press==='gmail') sdSend({ event:'openUrl', payload:{ url:'https://mail.google.com/mail/u/0/#inbox' } });
  else if (press==='url' && cfg.url2) sdSend({ event:'openUrl', payload:{ url:cfg.url2 } });
  else if (press==='service' && cfg.service && cfg.service.indexOf('.')>0){
    const [dom,svc] = cfg.service.split('.');
    const noTarget = ['script','scene','button','input_button','automation','notify'].indexOf(dom)>=0;
    haCall(cfg, dom, svc, noTarget ? null : cfg.entity);
  }
}

function onKeyUp(context){
  // lock "hold to confirm": released before the timer fired → cancel the pending action
  const h = HOLD[context];
  if (h){
    if (!h.fired){ clearTimeout(h.timer); LOCKHINT[context] = null; draw(context); }
    delete HOLD[context];
  }
  // scene "tap = toggle / hold = browse": a quick release (never stepped) is a tap → scene/off
  const c = CYCLE[context];
  if (c){
    clearInterval(c.timer);
    if (!c.stepped){ const info = ctxInfo[context]; if (info) toggleSceneOff(context, info.settings); }
    delete CYCLE[context];
  }
  // MA carousel "tap = toggle / hold = browse": a quick release toggles the current playlist
  const mc = MACYCLE[context];
  if (mc){
    clearInterval(mc.timer);
    if (!mc.stepped){
      const cfg = (ctxInfo[context]||{}).settings;
      if (cfg){
        const list = maList(cfg);
        const i = MAIDX[context]==null ? 0 : MAIDX[context];
        const item = list[i] || list[0];
        const st = stateFor(cfg);
        const cur = st && st.attributes && st.attributes.media_content_id;
        const activeThis = st && st.state==='playing' && item && (cur===item.id || STARTED[cfg.entity]===item.id);
        if (activeThis) haCall(cfg,'media_player','media_play_pause',cfg.entity);   // running → pause
        else if (item) maPlay(context, cfg, i);                                     // else → (re)start current
      }
    }
    delete MACYCLE[context];
  }
}

// ---- Stream Deck plumbing ----
function sdSend(o){ if (sd && sd.readyState===1) sd.send(JSON.stringify(o)); }

function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo){
  myUUID = inUUID;
  try { const info = JSON.parse(inInfo); LANG = (info.application && info.application.language || 'en').slice(0,2); } catch(e){}
  if (!STATE_L[LANG]) LANG = 'en';   // only 'de' localized; others fall back to raw
  sd = new WebSocket('ws://127.0.0.1:' + inPort);
  sd.onopen = ()=>{
    sd.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
    sd.send(JSON.stringify({ event:'getGlobalSettings', context: inUUID }));
  };
  sd.onmessage = (ev)=>{
    let m; try { m = JSON.parse(ev.data); } catch(e){ return; }
    const ctx = m.context;
    const settings = (m.payload && m.payload.settings) ? m.payload.settings : {};
    switch (m.event){
      case 'didReceiveGlobalSettings':
        GLOBAL = settings || {};
        STARTED = Object.assign({}, GLOBAL.started || {});   // restore last-started map
        if (GLOBAL.url && GLOBAL.token) connectHA(GLOBAL.url, GLOBAL.token);
        renderAll(); break;
      case 'willAppear':
        ctxInfo[ctx] = { action: m.action, settings };
        if (U(settings) && T(settings)) connectHA(U(settings), T(settings));
        draw(ctx);
        if (settings.display==='camera') refreshCam(ctx, settings);
        else if (settings.display==='trend') refreshTrend(ctx, settings);
        break;
      case 'willDisappear': delete ctxInfo[ctx]; break;
      case 'didReceiveSettings':
        if (ctxInfo[ctx]) ctxInfo[ctx].settings = settings;
        else ctxInfo[ctx] = { action: m.action, settings };
        if (U(settings) && T(settings)) connectHA(U(settings), T(settings));
        draw(ctx);
        if (settings.display==='camera') refreshCam(ctx, settings);
        else if (settings.display==='trend') refreshTrend(ctx, settings);
        break;
      case 'keyDown': onKeyDown(ctx); break;
      case 'keyUp': onKeyUp(ctx); break;
    }
  };
  // load the MDI icon font, then redraw everything so icons appear
  if (document.fonts && document.fonts.load){ document.fonts.load('24px "MDI"').then(()=>renderAll()).catch(()=>{}); }
}
</script>
